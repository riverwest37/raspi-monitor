<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quad Monitor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100vw;
      height: 100vh;
      gap: 2px;
      background: #222;
    }

    .cell {
      position: relative;
      background: #000;
      overflow: hidden;
    }

    .cell img,
    .cell iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .label {
      position: absolute;
      top: 8px;
      left: 8px;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
      font-size: 20px;
      font-family: sans-serif;
      border-radius: 4px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <div class="label">玄関 16</div>
      <img src="http://192.168.0.16:8080/?action=stream">
    </div>

    <div class="cell">
      <div class="label">車庫 55</div>
      <img src="http://192.168.0.55:8081/">
    </div>

    <div class="cell">
      <div class="label">CO2</div>
      <iframe class="co2frame" src="http://192.168.0.28:1880/ui"></iframe>
    </div>

    <div class="cell">
      <div class="label">予定</div>
      <iframe src="file:///home/pi/monitoring/schedule.html"></iframe>
    </div>
  </div>
</body>
</html>
